name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # release-please 会自动：
          # 1. 扫描 conventional commit
          # 2. 计算下一个版本号
          # 3. 更新 CHANGELOG.md
          # 4. 更新 package.json
          # 5. 开 PR（让你 review）
          # 6. PR merge 后自动打 git tag + GitHub Release
